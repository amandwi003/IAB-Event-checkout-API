# App listens here. ngrok must forward to THIS port (not 80).
# Dashboard text "ngrok http 80" is generic — for Spring Boot use:
#   ./gradlew tunnel
# or: ngrok http 8080 --url https://iab-event-checkout-api-production.up.railway.app
# or: ngrok start stripe-api --config ngrok.yml
server.port=${PORT:8080}

# ─────────────────────────────────────────────────────────────────
# STRIPE KEYS  —  paste your sk_test_... secret key below
# Publishable key is safe to commit; secret key is NOT.
# ─────────────────────────────────────────────────────────────────
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_51T9PrpHVUVKzkLSibPNta60u5ATcYSZohhgjjBbHbii8HwRbsQ2ijGGRKdcfJMGDNuhfHmxGLSw3R0Tslx0XG58o005mS8z0ml}
stripe.secret.key=${STRIPE_SECRET_KEY:}

# ─────────────────────────────────────────────────────────────────
# Logging  —  change to INFO to reduce console output
# ─────────────────────────────────────────────────────────────────
logging.level.com.stripe.checkout=DEBUG
logging.level.root=WARN
logging.level.org.springframework.web=INFO

# ─────────────────────────────────────────────────────────────────
# SALESFORCE — OAuth Web Server flow (browser login; no username/password here)
#
# 1) Register this exact callback URL on the Connected App:
#    salesforce.callback.url
# 2) In the Connected App, enable OAuth and add scope e.g. "Manage user data via APIs (api)"
#    and "Perform requests at any time (refresh_token)" if you want refresh tokens.
# 3) Open in browser: https://YOUR-HOST/api/salesforce/authorize
#
# salesforce.instance.url = default API host; OAuth may override with instance_url from the token response.
# Do not commit real secrets to a public repository.
# ─────────────────────────────────────────────────────────────────
salesforce.client.id=${SALESFORCE_CLIENT_ID:}
salesforce.client.secret=${SALESFORCE_CLIENT_SECRET:}
salesforce.instance.url=https://theiab--full2.sandbox.my.salesforce.com
salesforce.auth.url=https://test.salesforce.com/services/oauth2/authorize
salesforce.token.url=https://test.salesforce.com/services/oauth2/token
salesforce.api.version=v57.0
# Callback must exactly match the "Callback URL" configured in your Salesforce Connected App.
# Prefer environment override so you can run the app in multiple environments (ngrok/local/Railway).
salesforce.callback.url=${SALESFORCE_CALLBACK_URL:https://iab-event-checkout-api-production.up.railway.app/api/salesforce/callback}
# Space-separated scopes for authorize URL (must match Connected App)
salesforce.oauth.scope=api refresh_token
salesforce.demo.mode=${SALESFORCE_DEMO_MODE:false}
