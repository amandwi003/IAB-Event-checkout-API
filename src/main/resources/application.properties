# App listens here. ngrok must forward to THIS port (not 80).
# Dashboard text "ngrok http 80" is generic — for Spring Boot use:
#   ./gradlew tunnel
# or: ngrok http 8080 --url https://iab-event-checkout-api-production.up.railway.app
# or: ngrok start stripe-api --config ngrok.yml
server.port=${PORT:8080}

# ─────────────────────────────────────────────────────────────────
# STRIPE KEYS  —  paste your sk_test_... secret key below
# Publishable key is safe to commit; secret key is NOT.
# ─────────────────────────────────────────────────────────────────
stripe.publishable.key=${STRIPE_PUBLISHABLE_KEY:pk_test_51T9PrpHVUVKzkLSibPNta60u5ATcYSZohhgjjBbHbii8HwRbsQ2ijGGRKdcfJMGDNuhfHmxGLSw3R0Tslx0XG58o005mS8z0ml}
stripe.secret.key=${STRIPE_SECRET_KEY:}

# ─────────────────────────────────────────────────────────────────
# Logging  —  change to INFO to reduce console output
# ─────────────────────────────────────────────────────────────────
logging.level.com.stripe.checkout=DEBUG
logging.level.root=WARN
logging.level.org.springframework.web=INFO

# ─────────────────────────────────────────────────────────────────
# SALESFORCE — OAuth Web Server flow (browser login; no username/password here)
#
# 1) Register this exact callback URL on the Connected App:
#    salesforce.callback.url
# 2) In the Connected App, enable OAuth and add scope e.g. "Manage user data via APIs (api)"
#    and "Perform requests at any time (refresh_token)" if you want refresh tokens.
# 3) Open in browser: https://YOUR-HOST/api/salesforce/authorize
#
# salesforce.instance.url = default API host; OAuth may override with instance_url from the token response.
# Do not commit real secrets to a public repository.
# ─────────────────────────────────────────────────────────────────
salesforce.client.id=${SALESFORCE_CLIENT_ID:}
salesforce.client.secret=${SALESFORCE_CLIENT_SECRET:}
salesforce.instance.url=https://theiab--full2.sandbox.my.salesforce.com
salesforce.auth.url=https://test.salesforce.com/services/oauth2/authorize
salesforce.token.url=https://test.salesforce.com/services/oauth2/token
salesforce.api.version=v57.0
# Callback must exactly match the "Callback URL" configured in your Salesforce Connected App.
# Prefer environment override so you can run the app in multiple environments (ngrok/local/Railway).
salesforce.callback.url=${SALESFORCE_CALLBACK_URL:https://iab-event-checkout-api-production.up.railway.app/api/salesforce/callback}
# Space-separated scopes for authorize URL (must match Connected App)
salesforce.oauth.scope=api refresh_token
salesforce.demo.mode=${SALESFORCE_DEMO_MODE:false}
salesforce.token.store.enabled=${SALESFORCE_TOKEN_STORE_ENABLED:true}
salesforce.token.store.path=${SALESFORCE_TOKEN_STORE_PATH:.salesforce-token-store.json}
# Set this in Railway after first successful OAuth to avoid re-authorizing after redeploy:
salesforce.bootstrap.refresh.token=${SALESFORCE_BOOTSTRAP_REFRESH_TOKEN:}
salesforce.bootstrap.instance.url=${SALESFORCE_BOOTSTRAP_INSTANCE_URL:}

# Salesforce object/field mapping (supports custom objects, including WooCommerce sync objects)
# Contact upsert target: /sobjects/{object}/{externalIdField}/{email}
salesforce.contact.object=${SALESFORCE_CONTACT_OBJECT:Contact}
salesforce.contact.external.id.field=${SALESFORCE_CONTACT_EXTERNAL_ID_FIELD:Email}

# Order sync target object (default Opportunity)
salesforce.order.object=${SALESFORCE_ORDER_OBJECT:Opportunity}
salesforce.order.name.field=${SALESFORCE_ORDER_NAME_FIELD:Name}
salesforce.order.amount.field=${SALESFORCE_ORDER_AMOUNT_FIELD:Amount}
salesforce.order.description.field=${SALESFORCE_ORDER_DESCRIPTION_FIELD:Description}
salesforce.order.stage.field=${SALESFORCE_ORDER_STAGE_FIELD:StageName}
salesforce.order.close.date.field=${SALESFORCE_ORDER_CLOSE_DATE_FIELD:CloseDate}
salesforce.order.lead.source.field=${SALESFORCE_ORDER_LEAD_SOURCE_FIELD:LeadSource}
salesforce.order.default.stage.name=${SALESFORCE_ORDER_DEFAULT_STAGE_NAME:Closed Won}

# Optional custom fields for order object (leave blank if not needed)
salesforce.order.email.field=${SALESFORCE_ORDER_EMAIL_FIELD:}
salesforce.order.first.name.field=${SALESFORCE_ORDER_FIRST_NAME_FIELD:}
salesforce.order.last.name.field=${SALESFORCE_ORDER_LAST_NAME_FIELD:}
salesforce.order.member.field=${SALESFORCE_ORDER_MEMBER_FIELD:}

# Optional external-id upsert field on the order object, typically Stripe/Woo order id
# If set, order sync uses PATCH upsert by this field; if empty, it uses POST create.
salesforce.order.external.id.field=${SALESFORCE_ORDER_EXTERNAL_ID_FIELD:}
